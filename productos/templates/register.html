{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card card-custom">
            <div class="card-body p-4">
                <h3 class="text-center mb-4" style="color: #1a6b3c;">Crear cuenta</h3>
                <form method="POST" action="">
                    {% csrf_token %}
                    {% if form.errors %}
                    <div class="alert alert-danger">
                        <strong>Errores:</strong>
                        <ul class="mb-0">
                            {% for field in form %}
                                {% for error in field.errors %}
                                    <li>{{ error }}</li>
                                {% endfor %}
                            {% endfor %}
                        </ul>
                    </div>
                    {% endif %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-green w-100 py-2 mt-2">Registrarse</button>
                </form>
                <div class="text-center mt-3">
                    <small class="text-muted">Ya tienes cuenta? <a href="{% url 'home' %}" style="color: #1a6b3c;">Ingresa</a></small>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
