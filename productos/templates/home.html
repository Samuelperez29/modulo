{% extends 'base.html' %}
{% block content %}


    <div class="row justify-content-center" style="min-height: 70vh; align-items: center;">
        <div class="col-md-5">
            <div class="text-center mb-4">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#0d6b3c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                </svg>
                <h2 class="fw-bold mt-3" style="color: #0d6b3c;">Inventario</h2>
                <p class="text-muted">Administra tus productos de forma sencilla</p>
            </div>
            <div class="card card-custom border-0">
                <div class="card-body p-4">
                    <form method="POST" action="{% url 'home' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <input type="text" class="form-control" name="username" placeholder="Usuario" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" name="password" placeholder="Contrasena" required>
                        </div>
                        <button type="submit" class="btn btn-green w-100 py-2 fw-medium">Ingresar</button>
                    </form>
                    <div class="text-center mt-3">
                        <small class="text-muted">No tienes cuenta? <a href="{% url 'register' %}" style="color: #0d6b3c;" class="fw-medium">Registrate</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
