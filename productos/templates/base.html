{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d6b3c;
            --primary-dark: #0a522d;
            --primary-light: #e8f5e9;
            --primary-bg: #f0faf3;
            --bg: #f4f6f8;
            --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --card-shadow-hover: 0 10px 25px rgba(0,0,0,0.08);
            --radius: 12px;
            --radius-sm: 8px;
        }
        body {
            background-color: var(--bg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #1a1a2e;
        }
        .main-container {
            min-height: calc(100vh - 56px);
            padding: 2rem 0;
        }
        .card-custom {
            border: none;
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }
        .card-custom:hover {
            box-shadow: var(--card-shadow-hover);
        }
        .btn-green {
            background-color: var(--primary);
            border: none;
            color: #fff;
            border-radius: var(--radius-sm);
            padding: 0.5rem 1.25rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .btn-green:hover {
            background-color: var(--primary-dark);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(13, 107, 60, 0.3);
        }
        .btn-outline-green {
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: var(--radius-sm);
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .btn-outline-green:hover {
            background-color: var(--primary);
            color: #fff;
        }
        .badge-estado {
            font-size: 0.75rem;
            padding: 0.35rem 0.75rem;
            border-radius: 50px;
            font-weight: 500;
        }
        .form-control, .form-select {
            border-radius: var(--radius-sm);
            border: 1.5px solid #e0e0e0;
            padding: 0.6rem 0.9rem;
            font-size: 0.9rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13, 107, 60, 0.12);
        }
        .page-link {
            border-radius: var(--radius-sm) !important;
            margin: 0 2px;
            color: var(--primary);
            border: 1px solid #e0e0e0;
            font-weight: 500;
        }
        .page-item.active .page-link {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        footer {
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}
    <div class="main-container">
        <div class="container">
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm border-0 rounded-3" role="alert">
                    <span class="fw-medium">{{ message }}</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
            {% endif %}
            {% block content %}
            {% endblock %}
        </div>
    </div>
    <footer class="text-center text-muted py-3 border-top bg-white">
        <small>Sistema de Inventario &copy; 2026</small>
    </footer>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
